<!DOCTYPE html>
<html>
<head>
    <title>VENT — Breathe through med school</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0b2a4a 0%, #1b4a6b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
        }
        .logo {
            font-size: 8rem;
            font-weight: 800;
            letter-spacing: -4px;
            margin-bottom: 0;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
            background: linear-gradient(135deg, #fff 0%, #a8e6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        .logo-sub {
            font-size: 1.5rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-top: -20px;
            opacity: 0.8;
        }
        .tagline {
            font-size: 2rem;
            font-weight: 300;
            margin: 30px 0;
            font-style: italic;
            border-top: 1px solid rgba(255,255,255,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding: 20px;
        }
        .pill {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 50px;
            display: inline-block;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .footer {
            margin-top: 50px;
            font-size: 0.9rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">VENT</div>
        <div class="logo-sub">MEDICAL</div>
        
        <div class="tagline">Breathe through med school</div>
        
        <div class="pill">
            ⏳ First module: Acid-Base in 60 seconds
        </div>
        
        <p style="margin: 30px 0; line-height: 1.8;">
            For first-years drowning in information.<br>
            For clinicals running on empty.
        </p>
        
        <div style="margin: 40px 0;">
            <input type="email" placeholder="your.email@example.com" style="padding: 15px; width: 300px; border-radius: 30px; border: none; margin-right: 10px;">
            <button style="padding: 15px 30px; border-radius: 30px; border: none; background: white; color: #0b2a4a; font-weight: bold; cursor: pointer;">Notify Me</button>
        </div>
        
        <div class="footer">
            🫁 VENT — coming to vent.is-a.dev
        </div>
    </div>
</body>
</html>
